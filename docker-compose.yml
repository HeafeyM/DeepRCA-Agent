# ============================================
# DeepRCA-Agent Docker Compose
# 4 服务 + 5 Profile
# ============================================

services:
  # --- Infrastructure ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: ["infra", "dev", "smoke"]

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["infra", "dev", "smoke"]

  # --- Agent Service ---
  agent:
    build:
      context: .
      dockerfile: deeprca/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MOCK_ENV_ENABLED: "true"
      MOCK_K8S_API: http://mock-k8s:8001
      MOCK_MONITOR_API: http://mock-env:8002
      MOCK_LOG_API: http://mock-env:8003
      MOCK_CHANGE_API: http://mock-env:8004
    profiles: ["dev", "smoke", "full"]

  # --- Mock Environment ---
  mock-env:
    build:
      context: .
      dockerfile: mock_env/Dockerfile
    ports:
      - "8001-8004:8001-8004"
    profiles: ["mock", "dev", "smoke", "full"]

  # --- Smoke Test ---
  smoke-test:
    build:
      context: .
      dockerfile: tests/Dockerfile
    depends_on:
      agent:
        condition: service_started
      mock-env:
        condition: service_started
    environment:
      AGENT_API: http://agent:8000
      MOCK_K8S_API: http://mock-env:8001
    profiles: ["smoke"]

volumes:
  redis-data:
